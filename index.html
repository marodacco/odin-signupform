<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-up Form</title>
  <link rel="stylesheet" type="text/css" href="./styles.css">
</head>
<body>

  <header>
    <div class="container">
      <h1><img src="./img/odin-lined.png" alt="ODIN logo">ODIN</h1>
    </div>

    <p>Photo by <a href="https://unsplash.com/@wenhao_ruan?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Wenhao Ruan</a> on <a href="https://unsplash.com/photos/a-red-bridge-over-a-river-with-a-city-in-the-background-4g1wsFGABZk?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</p></a>
  </header>
  
  <main>
    <p>
      This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br>Sign up <em>now</em> to get started.
    </p>
    <p>You know you want to.</p>

    <form action="" id="form">
      <p>Let's do this!</p>

      <div class="container">
        <label for="fname">
          FIRST NAME
          <input type="text" id="fname" name="fname">
        </label>
        <label for="lname">
          LAST NAME
          <input type="text" id="lname" name="lname">
        </label>
        <label for="email">
          EMAIL
          <input type="email" id="email" name="email">
        </label>
        <label for="phone">
          PHONE NUMBER
          <input type="tel" id="phone" name="phone">
        </label>
        <label for="password">
          PASSWORD
          <input type="password" id="password" name="password" required>
        </label>
        <label for="cpassword">
          CONFIRM PASSWORD
          <input type="password" id="cpassword" name="cpassword" required>
        </label>
      </div>
    </form>

    <button type="submit" form="form">Create Account</button>
    
    <p>Already have an account? <a href="">Log in</a></p>
  </main>
  
</body>
</html>
